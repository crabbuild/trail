name: CLI Scale Benchmark

on:
  schedule:
    - cron: "17 9 * * *"
  workflow_dispatch:
    inputs:
      scale_files:
        description: "Comma-separated file counts, for example 10000,100000,1000000"
        required: true
        default: "10000,100000,1000000"
      run_materialized:
        description: "Run materialized/sparse workdir benchmark cases"
        required: true
        default: "0"
      run_backup:
        description: "Run backup benchmark cases"
        required: true
        default: "0"
      run_daemon:
        description: "Run daemon hot-path benchmark cases"
        required: true
        default: "1"
      run_git_import:
        description: "Run Git import/update benchmark cases"
        required: true
        default: "1"
      changed_path_ledger_files:
        description: "Changed-path ledger scale (1000, 100000, or 1000000)"
        required: true
        default: "1000"

jobs:
  scale:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run CLI scale benchmark
        run: scripts/cli-scale-bench.sh
        env:
          TRAIL_SCALE_BASE: ${{ runner.temp }}
          TRAIL_SCALE_LABEL: scale-${{ github.run_id }}
          TRAIL_SCALE_FILES: ${{ github.event.inputs.scale_files || '10000,100000,1000000' }}
          TRAIL_SCALE_MATERIALIZED: ${{ github.event.inputs.run_materialized || '0' }}
          TRAIL_SCALE_BACKUP: ${{ github.event.inputs.run_backup || '0' }}
          TRAIL_SCALE_DAEMON: ${{ github.event.inputs.run_daemon || '1' }}
          TRAIL_SCALE_GIT_IMPORT: ${{ github.event.inputs.run_git_import || '1' }}
      - name: Summarize scale results
        if: always()
        run: |
          find "${{ runner.temp }}/trail-cli-scale-scale-${{ github.run_id }}" -name results.tsv -print -exec cat {} \; || true
          find "${{ runner.temp }}/trail-cli-scale-scale-${{ github.run_id }}" -name metrics.tsv -print -exec cat {} \; || true
      - name: Check large-agent hot path thresholds
        if: always()
        run: |
          root="${{ runner.temp }}/trail-cli-scale-scale-${{ github.run_id }}"
          mapfile -t result_files < <(find "$root" -name results.tsv -print | sort)
          if [ "${#result_files[@]}" -eq 0 ]; then
            echo "no scale benchmark results found under $root" >&2
            exit 1
          fi
          daemon_thresholds=()
          if [ "${{ github.event.inputs.run_daemon || '1' }}" = "1" ]; then
            daemon_thresholds=(
              daemon_wait_for_health=60
              daemon_wait_for_hot_cache=120
              daemon_status=5
              daemon_persisted_snapshot_status=5
              daemon_persisted_snapshot_record_clean=5
              daemon_persisted_snapshot_diff_dirty=10
              daemon_cli_status=5
              daemon_cli_record_dirty=10
              daemon_cli_agent_readiness=5
              daemon_cli_agent_trace_summary=5
              daemon_cli_merge_dry_run=10
              daemon_cli_session_start=10
              daemon_cli_approval_request=10
              daemon_cli_lease_acquire=10
              daemon_cli_timeline=10
              daemon_cli_why=10
              daemon_cli_history=10
              daemon_cli_code_from=10
            )
          else
            echo "omitting daemon hot-path thresholds because run_daemon is disabled"
          fi
          git_thresholds=()
          if [ "${{ github.event.inputs.run_git_import || '1' }}" = "1" ]; then
            git_thresholds=(
              git_dirty_status=120
              git_dirty_diff=120
              git_dirty_record=120
              git_status_after_dirty_record=90
            )
          fi
          materialized_thresholds=()
          if [ "${{ github.event.inputs.run_materialized || '0' }}" = "1" ]; then
            materialized_thresholds=(
              agent_spawn_sparse=30
              agent_read_sparse_hydrate_neighbors=30
              agent_sync_sparse_dir=30
              agent_spawn_materialized=120
              agent_status_materialized=60
              agent_record_materialized=120
            )
          fi
          backup_thresholds=()
          if [ "${{ github.event.inputs.run_backup || '0' }}" = "1" ]; then
            backup_thresholds=(
              backup_create=180
              backup_verify=180
            )
          fi
          for results in "${result_files[@]}"; do
            metrics="$(dirname "$results")/metrics.tsv"
            scale="$(basename "$(dirname "$results")")"
            git_apply_thresholds=()
            git_structural_thresholds=()
            git_metric_equalities=()
            if [ "${{ github.event.inputs.run_git_import || '1' }}" = "1" ]; then
              changed_paths=$((scale / 1000))
              if [ "$changed_paths" -lt 1 ]; then changed_paths=1; fi
              if [ "$changed_paths" -gt 100 ]; then changed_paths=100; fi
              case "$scale" in
                100000)
                  git_apply_thresholds=(
                    agent_git_apply_dry_run=2
                    agent_git_apply=3
                    agent_git_apply_missing_mapping=1
                  )
                  ;;
                1000000)
                  git_apply_thresholds=(
                    agent_git_apply_dry_run=5
                    agent_git_apply=8
                    agent_git_apply_missing_mapping=1
                  )
                  ;;
                *)
                  git_apply_thresholds=(
                    agent_git_apply_dry_run=15
                    agent_git_apply=20
                    agent_git_apply_missing_mapping=5
                  )
                  ;;
              esac
              git_structural_thresholds=(
                "agent_git_changed_paths=$changed_paths"
                "agent_git_blob_writes=$changed_paths"
                agent_git_plumbing_commands=5
              )
              git_metric_equalities=(
                agent_git_export_mode=mapped_delta
                "agent_git_changed_paths=$changed_paths"
              )
            fi
            patch_paths=$((scale / 200))
            if [ "$patch_paths" -lt 1 ]; then patch_paths=1; fi
            if [ "$patch_paths" -gt 50 ]; then patch_paths=50; fi
            path_index_structural_thresholds=(
              "patch_path_index_lookup_count=$patch_paths"
              patch_path_index_full_root_path_load_count=0
              patch_path_index_full_filesystem_path_scan_count=0
              record_path_index_lookup_count=1
              record_path_index_full_root_path_load_count=0
              record_path_index_full_filesystem_path_scan_count=0
              empty_root_patch_path_index_lookup_count=1
              empty_root_patch_path_index_full_root_path_load_count=0
              empty_root_patch_path_index_full_filesystem_path_scan_count=0
              rename_patch_path_index_lookup_count=2
              rename_patch_path_index_full_root_path_load_count=0
              rename_patch_path_index_full_filesystem_path_scan_count=0
            )
            path_index_metric_equalities=(
              patch_path_index_mode=indexed
              record_path_index_mode=indexed
              empty_root_patch_path_index_mode=indexed
              rename_patch_path_index_mode=indexed
            )
            python3 scripts/check-cli-scale-thresholds.py "$results" \
              "${daemon_thresholds[@]}" \
              agent_apply_patch=10 \
              path_index_rename_patch=10 \
              path_index_empty_patch=10 \
              path_index_record=10 \
              agent_readiness=10 \
              merge_agent_dry_run=10 \
              merge_agent_apply=10 \
              lane_merge_queue_run=10 \
              "${git_thresholds[@]}" \
              "${git_apply_thresholds[@]}" \
              "${materialized_thresholds[@]}" \
              "${backup_thresholds[@]}" \
              --metrics "$metrics" \
              sqlite_bytes=4000000000 \
              dbstat_repo_prolly_nodes=2500000000 \
              object_kind_repo_TextContent_bytes=1200000000 \
              object_count=2000000 \
              "${path_index_structural_thresholds[@]}" \
              "${git_structural_thresholds[@]}" \
              --metric-equals \
              "${path_index_metric_equalities[@]}" \
              "${git_metric_equalities[@]}"
          done
      - name: Upload scale results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trail-cli-scale-results
          path: ${{ runner.temp }}/trail-cli-scale-scale-${{ github.run_id }}

  changed-path-ledger:
    name: Changed-path ledger scale gate
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release binary
        run: cargo build -p trail --release
      - name: Run changed-path ledger benchmark
        run: scripts/cli-scale-bench.sh changed-path-ledger
        env:
          TRAIL_BIN: ${{ github.workspace }}/target/release/trail
          TRAIL_SCALE_BASE: ${{ runner.temp }}
          TRAIL_SCALE_LABEL: changed-path-${{ github.run_id }}
          TRAIL_SCALE_FILES: ${{ github.event.inputs.changed_path_ledger_files || '1000' }}
          TRAIL_CHANGED_PATH_COW: "0"
      - name: Gate changed-path ledger structure and oracle equality
        shell: bash
        run: |
          root="${{ runner.temp }}/trail-cli-scale-changed-path-${{ github.run_id }}"
          for scale in ${{ github.event.inputs.changed_path_ledger_files || '1000' }}; do
            python3 scripts/check-changed-path-ledger-thresholds.py \
              "$root/$scale/results.tsv" \
              "$root/$scale/structural-metrics.jsonl" \
              --oracle "$root/$scale/oracle-results.tsv" \
              --max-seconds workspace_status=15 \
              --max-seconds workspace_diff=20 \
              --max-seconds workspace_record=30 \
              --max-seconds materialized_lane_record=120 \
              --max-seconds structured_patch=30 \
              --max-rss-bytes workspace_status=2147483648 \
              --max-rss-bytes workspace_diff=2147483648 \
              --max-rss-bytes workspace_record=2147483648
          done
      - name: Upload changed-path ledger artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: changed-path-ledger-scale-results
          path: ${{ runner.temp }}/trail-cli-scale-changed-path-${{ github.run_id }}
