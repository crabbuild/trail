<svg viewBox="0 0 1600 640" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Prolly Trees conceptual cover</title>
  <desc id="desc">A simplified conceptual cover for Prolly trees showing three core ideas: B-tree-like ordered structure, stable content-defined boundaries, and a multi-version timeline with structural sharing.</desc>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.6" opacity="0.7"/>
    </pattern>
    <radialGradient id="glow" cx="66%" cy="45%" r="62%">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.22"/>
      <stop offset="45%" stop-color="#7c3aed" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-45%" y="-45%" width="190%" height="190%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="greenGlow" x="-45%" y="-45%" width="190%" height="190%">
      <feGaussianBlur stdDeviation="4.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 Z" fill="#22d3ee"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 Z" fill="#34d399"/>
    </marker>
    <marker id="arrow-violet" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 Z" fill="#a78bfa"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 Z" fill="#fbbf24"/>
    </marker>
    <style>
      text { font-family: 'JetBrains Mono', 'SF Mono', 'Cascadia Code', Menlo, monospace; letter-spacing: 0; }
      .title { fill: #f8fafc; font-size: 57px; font-weight: 800; }
      .subtitle { fill: #a7b6ce; font-size: 21px; font-weight: 700; }
      .h2 { fill: #e0f2fe; font-size: 15px; font-weight: 800; }
      .h3 { fill: #f8fafc; font-size: 12px; font-weight: 800; }
      .body { fill: #aebbd0; font-size: 9px; font-weight: 500; }
      .tiny { fill: #94a3b8; font-size: 7.6px; font-weight: 600; }
      .micro { fill: #94a3b8; font-size: 6.8px; font-weight: 600; }
      .mask { fill: #0f172a; }
      .panel-cyan { fill: #082f49; fill-opacity: 0.48; stroke: #22d3ee; stroke-width: 1.6; }
      .panel-green { fill: #064e3b; fill-opacity: 0.48; stroke: #34d399; stroke-width: 1.6; }
      .panel-violet { fill: #2e1065; fill-opacity: 0.52; stroke: #a78bfa; stroke-width: 1.6; }
      .panel-amber { fill: #451a03; fill-opacity: 0.42; stroke: #fbbf24; stroke-width: 1.5; }
      .panel-slate { fill: #1e293b; fill-opacity: 0.54; stroke: #94a3b8; stroke-width: 1.3; }
      .line { fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
      .thin { fill: none; stroke-width: 1.2; stroke-linecap: round; stroke-linejoin: round; }
      .cyan { stroke: #22d3ee; }
      .green { stroke: #34d399; }
      .violet { stroke: #a78bfa; }
      .amber { stroke: #fbbf24; }
      .slate { stroke: #94a3b8; }
      .dash { stroke-dasharray: 7 7; }
      .chip-text { fill: #dbeafe; font-size: 7.5px; font-weight: 700; text-anchor: middle; }
    </style>
  </defs>

  <rect width="1600" height="640" fill="#020617"/>
  <rect width="1600" height="640" fill="#0f172a"/>
  <rect width="1600" height="640" fill="url(#grid)"/>
  <rect width="1600" height="640" fill="url(#glow)"/>

  <g opacity="0.22">
    <path d="M1470 54 h34 l18 29 -18 29 h-34 l-18 -29 Z" fill="none" stroke="#38bdf8" stroke-width="2"/>
    <path d="M1520 54 h34 l18 29 -18 29 h-34 l-18 -29 Z" fill="none" stroke="#38bdf8" stroke-width="2"/>
    <path d="M1570 54 h34 l18 29 -18 29 h-34 l-18 -29 Z" fill="none" stroke="#38bdf8" stroke-width="2"/>
    <path d="M1520 112 h34 l18 29 -18 29 h-34 l-18 -29 Z" fill="none" stroke="#38bdf8" stroke-width="2"/>
  </g>

  <!-- Editorial left side -->
  <text x="50" y="84" class="title">Prolly Trees</text>
  <text x="54" y="126" class="subtitle">Content-addressed ordered indexes</text>
  <text x="54" y="154" class="subtitle">for versioned data</text>

  <g transform="translate(56,224)">
    <rect class="mask" width="410" height="174" rx="14"/>
    <rect class="panel-cyan" width="410" height="174" rx="14"/>
    <text x="28" y="35" class="h3">Mental model</text>
    <g transform="translate(28,58)">
      <rect class="panel-violet" width="166" height="30" rx="15"/>
      <text x="83" y="19" class="chip-text">ordered tree</text>
      <rect class="panel-green" x="188" width="166" height="30" rx="15"/>
      <text x="271" y="19" class="chip-text">content identity</text>
      <rect class="panel-cyan" y="44" width="166" height="30" rx="15"/>
      <text x="83" y="63" class="chip-text">stable chunks</text>
      <rect class="panel-amber" x="188" y="44" width="166" height="30" rx="15"/>
      <text x="271" y="63" class="chip-text">version roots</text>
    </g>
    <line x1="28" y1="144" x2="382" y2="144" stroke="#22d3ee" stroke-opacity="0.25"/>
    <text x="28" y="160" class="body">A deterministic tree shape over sorted key/value data.</text>
  </g>

  <g transform="translate(56,424)">
    <rect class="mask" width="410" height="92" rx="14"/>
    <rect class="panel-slate" width="410" height="92" rx="14"/>
    <text x="30" y="39" fill="#e2e8f0" font-size="24" font-weight="800">same CID</text>
    <text x="208" y="39" fill="#a7b6ce" font-size="17" font-weight="800">= same subtree</text>
    <text x="30" y="68" class="body">Stable serialized nodes make history cheap to compare.</text>
  </g>

  <g transform="translate(56,540)">
    <rect class="mask" width="410" height="56" rx="12"/>
    <rect class="panel-green" width="410" height="56" rx="12"/>
    <text x="28" y="24" class="body" fill="#d1fae5">Snapshots, branching, sync, diff, merge, audit history</text>
    <text x="28" y="42" class="tiny">One root CID identifies one complete ordered state.</text>
  </g>

  <!-- Main concept area -->
  <rect x="500" y="40" width="1050" height="556" rx="22" fill="none" stroke="#64748b" stroke-width="1.2" stroke-dasharray="7 7" opacity="0.6"/>
  <text x="530" y="74" class="h2">Three ideas, one data structure</text>
  <text x="530" y="96" class="body">B-tree-like lookup, stable chunk boundaries, and Git-like version roots over a shared content graph.</text>

  <!-- Central hub -->
  <g transform="translate(892,238)" filter="url(#softGlow)">
    <circle cx="116" cy="100" r="82" fill="#0f172a"/>
    <circle cx="116" cy="100" r="82" fill="#2e1065" fill-opacity="0.56" stroke="#a78bfa" stroke-width="2"/>
    <circle cx="116" cy="100" r="58" fill="#082f49" fill-opacity="0.56" stroke="#22d3ee" stroke-width="1.5"/>
    <text x="116" y="86" fill="#f8fafc" font-size="16" font-weight="800" text-anchor="middle">PROLLY</text>
    <text x="116" y="106" fill="#f8fafc" font-size="16" font-weight="800" text-anchor="middle">TREE</text>
    <text x="116" y="128" class="tiny" text-anchor="middle">ordered + content-addressed</text>
  </g>

  <!-- Spokes -->
  <path class="line violet" d="M962 274 C900 224 822 196 740 178" marker-end="url(#arrow-violet)" opacity="0.7"/>
  <path class="line amber" d="M958 392 C876 430 792 454 710 462" marker-end="url(#arrow-amber)" opacity="0.7"/>
  <path class="line green" d="M1110 392 C1198 432 1290 446 1384 432" marker-end="url(#arrow-green)" opacity="0.7"/>

  <!-- Concept 1: B-tree-like structural -->
  <g transform="translate(552,126)">
    <rect class="mask" width="312" height="178" rx="16"/>
    <rect class="panel-violet" width="312" height="178" rx="16"/>
    <text x="24" y="32" class="h3">B-tree-like structure</text>
    <text x="24" y="52" class="body">ordered routing over key ranges</text>

    <g transform="translate(54,78)">
      <rect class="mask" x="70" y="0" width="94" height="30" rx="7"/>
      <rect class="panel-violet" x="70" y="0" width="94" height="30" rx="7"/>
      <text x="117" y="20" class="tiny" text-anchor="middle">root</text>

      <path class="thin violet" d="M117 30 C96 50 80 55 56 67" marker-end="url(#arrow-violet)"/>
      <path class="thin violet" d="M117 30 V66" marker-end="url(#arrow-violet)"/>
      <path class="thin violet" d="M117 30 C140 50 156 55 178 67" marker-end="url(#arrow-violet)"/>

      <rect class="mask" x="12" y="66" width="70" height="28" rx="6"/>
      <rect class="panel-cyan" x="12" y="66" width="70" height="28" rx="6"/>
      <rect class="mask" x="82" y="66" width="70" height="28" rx="6"/>
      <rect class="panel-cyan" x="82" y="66" width="70" height="28" rx="6"/>
      <rect class="mask" x="152" y="66" width="70" height="28" rx="6"/>
      <rect class="panel-cyan" x="152" y="66" width="70" height="28" rx="6"/>
      <text x="47" y="84" class="micro" text-anchor="middle">[a,g)</text>
      <text x="117" y="84" class="micro" text-anchor="middle">[g,t)</text>
      <text x="187" y="84" class="micro" text-anchor="middle">[t,z)</text>
    </g>
  </g>

  <!-- Concept 2: stable boundaries -->
  <g transform="translate(552,356)">
    <rect class="mask" width="312" height="170" rx="16"/>
    <rect class="panel-amber" width="312" height="170" rx="16"/>
    <text x="24" y="32" class="h3">Stable boundaries</text>
    <text x="24" y="52" class="body">content-defined chunks survive inserts</text>

    <g transform="translate(28,82)">
      <rect x="0" y="0" width="254" height="46" rx="9" fill="#020617" fill-opacity="0.45" stroke="#64748b" stroke-width="1"/>
      <rect x="14" y="12" width="46" height="22" rx="5" fill="#064e3b" fill-opacity="0.6" stroke="#34d399"/>
      <rect x="74" y="12" width="46" height="22" rx="5" fill="#064e3b" fill-opacity="0.6" stroke="#34d399"/>
      <rect x="134" y="12" width="46" height="22" rx="5" fill="#064e3b" fill-opacity="0.6" stroke="#34d399"/>
      <rect x="194" y="12" width="46" height="22" rx="5" fill="#064e3b" fill-opacity="0.6" stroke="#34d399"/>
      <path class="thin amber" d="M66 -8 V54 M126 -8 V54 M186 -8 V54" stroke-dasharray="4 4"/>
      <text x="66" y="-13" fill="#fbbf24" font-size="9" font-weight="800" text-anchor="middle">#</text>
      <text x="126" y="-13" fill="#fbbf24" font-size="9" font-weight="800" text-anchor="middle">#</text>
      <text x="186" y="-13" fill="#fbbf24" font-size="9" font-weight="800" text-anchor="middle">#</text>
      <text x="127" y="74" class="tiny" text-anchor="middle">rolling hash chooses repeatable cut points</text>
    </g>
  </g>

  <!-- Concept 3: version timeline -->
  <g transform="translate(1160,126)">
    <rect class="mask" width="328" height="400" rx="16"/>
    <rect class="panel-green" width="328" height="400" rx="16"/>
    <text x="24" y="32" class="h3">Multi-version timeline</text>
    <text x="24" y="52" class="body">new roots reuse unchanged subtrees</text>

    <g transform="translate(38,92)">
      <path class="line green" d="M22 56 H238" marker-end="url(#arrow-green)" opacity="0.75"/>
      <circle cx="22" cy="56" r="10" fill="#082f49" stroke="#22d3ee" stroke-width="1.5"/>
      <circle cx="130" cy="56" r="10" fill="#064e3b" stroke="#34d399" stroke-width="1.5"/>
      <circle cx="238" cy="56" r="10" fill="#2e1065" stroke="#a78bfa" stroke-width="1.5"/>
      <text x="22" y="30" fill="#22d3ee" font-size="12" font-weight="800" text-anchor="middle">v1</text>
      <text x="130" y="30" fill="#34d399" font-size="12" font-weight="800" text-anchor="middle">v2</text>
      <text x="238" y="30" fill="#a78bfa" font-size="12" font-weight="800" text-anchor="middle">v3</text>
      <text x="130" y="86" class="tiny" text-anchor="middle">root CID changes over time</text>

      <path d="M62 144 C96 128 162 128 198 144" fill="none" stroke="#34d399" stroke-width="12" stroke-opacity="0.18" stroke-linecap="round" filter="url(#greenGlow)"/>
      <path d="M62 144 C96 128 162 128 198 144" class="line green" filter="url(#greenGlow)"/>
      <rect class="mask" x="24" y="118" width="76" height="52" rx="9"/>
      <rect class="panel-green" x="24" y="118" width="76" height="52" rx="9"/>
      <text x="62" y="141" class="h3" text-anchor="middle">shared</text>
      <text x="62" y="158" class="micro" text-anchor="middle">same CID</text>
      <rect class="mask" x="160" y="118" width="76" height="52" rx="9"/>
      <rect class="panel-green" x="160" y="118" width="76" height="52" rx="9"/>
      <text x="198" y="141" class="h3" text-anchor="middle">shared</text>
      <text x="198" y="158" class="micro" text-anchor="middle">same CID</text>

      <rect class="mask" x="92" y="210" width="76" height="52" rx="9"/>
      <rect class="panel-violet" x="92" y="210" width="76" height="52" rx="9"/>
      <text x="130" y="233" class="h3" text-anchor="middle">delta</text>
      <text x="130" y="250" class="micro" text-anchor="middle">new CID</text>
      <path class="thin violet" d="M130 170 V210" marker-end="url(#arrow-violet)"/>
    </g>
  </g>

  <!-- Footer -->
  <g transform="translate(500,606)">
    <rect class="mask" width="1050" height="28" rx="10"/>
    <rect width="1050" height="28" rx="10" fill="#1e293b" fill-opacity="0.52" stroke="#64748b" stroke-width="1"/>
    <text x="525" y="19" fill="#cbd5e1" font-size="8.6" font-weight="600" text-anchor="middle">Core promise: stable content-defined structure makes ordered data cheap to version, compare, merge, and sync.</text>
  </g>
</svg>
