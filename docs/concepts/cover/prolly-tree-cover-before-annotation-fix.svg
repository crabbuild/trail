<svg viewBox="0 0 1600 640" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Prolly Trees refined conceptual cover</title>
  <desc id="desc">A refined concept cover for Prolly trees showing three high-level properties: B-tree-like ordered structure, stable content-defined boundaries, and multi-version timelines with structural sharing.</desc>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.6" opacity="0.7"/>
    </pattern>
    <radialGradient id="glow" cx="67%" cy="45%" r="62%">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.22"/>
      <stop offset="45%" stop-color="#7c3aed" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-45%" y="-45%" width="190%" height="190%">
      <feGaussianBlur stdDeviation="3.4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="greenGlow" x="-45%" y="-45%" width="190%" height="190%">
      <feGaussianBlur stdDeviation="4.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 Z" fill="#22d3ee"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 Z" fill="#34d399"/>
    </marker>
    <marker id="arrow-violet" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 Z" fill="#a78bfa"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 Z" fill="#fbbf24"/>
    </marker>
    <style>
      text { font-family: 'JetBrains Mono', 'SF Mono', 'Cascadia Code', Menlo, monospace; letter-spacing: 0; }
      .title { fill: #f8fafc; font-size: 57px; font-weight: 800; }
      .subtitle { fill: #a7b6ce; font-size: 21px; font-weight: 700; }
      .h2 { fill: #e0f2fe; font-size: 15px; font-weight: 800; }
      .h3 { fill: #f8fafc; font-size: 12px; font-weight: 800; }
      .body { fill: #aebbd0; font-size: 9px; font-weight: 500; }
      .tiny { fill: #94a3b8; font-size: 7.6px; font-weight: 600; }
      .micro { fill: #94a3b8; font-size: 6.8px; font-weight: 600; }
      .mask { fill: #0f172a; }
      .panel-cyan { fill: #082f49; fill-opacity: 0.48; stroke: #22d3ee; stroke-width: 1.6; }
      .panel-green { fill: #064e3b; fill-opacity: 0.48; stroke: #34d399; stroke-width: 1.6; }
      .panel-violet { fill: #2e1065; fill-opacity: 0.52; stroke: #a78bfa; stroke-width: 1.6; }
      .panel-amber { fill: #451a03; fill-opacity: 0.42; stroke: #fbbf24; stroke-width: 1.5; }
      .panel-slate { fill: #1e293b; fill-opacity: 0.54; stroke: #94a3b8; stroke-width: 1.3; }
      .line { fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
      .thin { fill: none; stroke-width: 1.2; stroke-linecap: round; stroke-linejoin: round; }
      .dash { stroke-dasharray: 7 7; }
      .cyan { stroke: #22d3ee; }
      .green { stroke: #34d399; }
      .violet { stroke: #a78bfa; }
      .amber { stroke: #fbbf24; }
      .slate { stroke: #94a3b8; }
      .chip-text { fill: #dbeafe; font-size: 7.5px; font-weight: 700; text-anchor: middle; }
      .icon-label { fill: #dbeafe; font-size: 8px; font-weight: 800; text-anchor: middle; }
    </style>
  </defs>

  <rect width="1600" height="640" fill="#020617"/>
  <rect width="1600" height="640" fill="#0f172a"/>
  <rect width="1600" height="640" fill="url(#grid)"/>
  <rect width="1600" height="640" fill="url(#glow)"/>

  <g opacity="0.22">
    <path d="M1470 54 h34 l18 29 -18 29 h-34 l-18 -29 Z" fill="none" stroke="#38bdf8" stroke-width="2"/>
    <path d="M1520 54 h34 l18 29 -18 29 h-34 l-18 -29 Z" fill="none" stroke="#38bdf8" stroke-width="2"/>
    <path d="M1570 54 h34 l18 29 -18 29 h-34 l-18 -29 Z" fill="none" stroke="#38bdf8" stroke-width="2"/>
    <path d="M1520 112 h34 l18 29 -18 29 h-34 l-18 -29 Z" fill="none" stroke="#38bdf8" stroke-width="2"/>
  </g>

  <!-- Editorial left side -->
  <text x="50" y="84" class="title">Prolly Trees</text>
  <text x="54" y="126" class="subtitle">Content-addressed ordered indexes</text>
  <text x="54" y="154" class="subtitle">for versioned data</text>

  <g transform="translate(56,224)">
    <rect class="mask" width="410" height="174" rx="14"/>
    <rect class="panel-cyan" width="410" height="174" rx="14"/>
    <text x="28" y="35" class="h3">Mental model</text>
    <g transform="translate(28,58)">
      <rect class="panel-violet" width="166" height="30" rx="15"/>
      <text x="83" y="19" class="chip-text">ordered tree</text>
      <rect class="panel-green" x="188" width="166" height="30" rx="15"/>
      <text x="271" y="19" class="chip-text">content identity</text>
      <rect class="panel-cyan" y="44" width="166" height="30" rx="15"/>
      <text x="83" y="63" class="chip-text">stable chunks</text>
      <rect class="panel-amber" x="188" y="44" width="166" height="30" rx="15"/>
      <text x="271" y="63" class="chip-text">version roots</text>
    </g>
    <line x1="28" y1="144" x2="382" y2="144" stroke="#22d3ee" stroke-opacity="0.25"/>
    <text x="28" y="160" class="body">A deterministic tree shape over sorted key/value data.</text>
  </g>

  <g transform="translate(56,424)">
    <rect class="mask" width="410" height="92" rx="14"/>
    <rect class="panel-slate" width="410" height="92" rx="14"/>
    <text x="30" y="39" fill="#e2e8f0" font-size="24" font-weight="800">same CID</text>
    <text x="208" y="39" fill="#a7b6ce" font-size="17" font-weight="800">= same subtree</text>
    <text x="30" y="68" class="body">Stable serialized nodes make history cheap to compare.</text>
  </g>

  <g transform="translate(56,540)">
    <rect class="mask" width="410" height="56" rx="12"/>
    <rect class="panel-green" width="410" height="56" rx="12"/>
    <text x="28" y="24" class="body" fill="#d1fae5">Snapshots, branching, sync, diff, merge, audit history</text>
    <text x="28" y="42" class="tiny">One root CID identifies one complete ordered state.</text>
  </g>

  <!-- Main concept area -->
  <rect x="500" y="40" width="1050" height="556" rx="22" fill="none" stroke="#64748b" stroke-width="1.2" stroke-dasharray="7 7" opacity="0.6"/>
  <text x="530" y="74" class="h2">A stable ordered index with Git-like history</text>
  <text x="530" y="96" class="body">Three concepts combine into a small root handle over a shared content-addressed graph.</text>

  <!-- Cards row -->
  <g transform="translate(548,134)">
    <rect class="mask" width="286" height="284" rx="16"/>
    <rect class="panel-violet" width="286" height="284" rx="16"/>
    <text x="24" y="32" class="h3">B-tree-like structure</text>
    <text x="24" y="54" class="body">ordered lookup and range scans</text>

    <g transform="translate(44,92)">
      <rect class="mask" x="62" y="0" width="88" height="32" rx="8"/>
      <rect class="panel-violet" x="62" y="0" width="88" height="32" rx="8"/>
      <text x="106" y="21" class="icon-label">root</text>
      <path class="thin violet" d="M106 32 C80 56 60 66 40 86" marker-end="url(#arrow-violet)"/>
      <path class="thin violet" d="M106 32 V84" marker-end="url(#arrow-violet)"/>
      <path class="thin violet" d="M106 32 C132 56 152 66 172 86" marker-end="url(#arrow-violet)"/>
      <rect class="mask" x="0" y="86" width="70" height="34" rx="7"/>
      <rect class="panel-cyan" x="0" y="86" width="70" height="34" rx="7"/>
      <rect class="mask" x="71" y="86" width="70" height="34" rx="7"/>
      <rect class="panel-cyan" x="71" y="86" width="70" height="34" rx="7"/>
      <rect class="mask" x="142" y="86" width="70" height="34" rx="7"/>
      <rect class="panel-cyan" x="142" y="86" width="70" height="34" rx="7"/>
      <text x="35" y="108" class="micro" text-anchor="middle">[a,g)</text>
      <text x="106" y="108" class="micro" text-anchor="middle">[g,t)</text>
      <text x="177" y="108" class="micro" text-anchor="middle">[t,z)</text>
      <text x="106" y="150" class="tiny" text-anchor="middle">sorted leaves, logarithmic routing</text>
    </g>
  </g>

  <g transform="translate(866,134)">
    <rect class="mask" width="286" height="284" rx="16"/>
    <rect class="panel-amber" width="286" height="284" rx="16"/>
    <text x="24" y="32" class="h3">Stable boundaries</text>
    <text x="24" y="54" class="body">content-defined chunks</text>

    <g transform="translate(30,104)">
      <rect x="0" y="0" width="226" height="58" rx="10" fill="#020617" fill-opacity="0.46" stroke="#64748b" stroke-width="1"/>
      <rect x="14" y="17" width="42" height="24" rx="6" fill="#064e3b" fill-opacity="0.7" stroke="#34d399" stroke-width="1.2"/>
      <rect x="66" y="17" width="42" height="24" rx="6" fill="#064e3b" fill-opacity="0.7" stroke="#34d399" stroke-width="1.2"/>
      <rect x="118" y="17" width="42" height="24" rx="6" fill="#064e3b" fill-opacity="0.7" stroke="#34d399" stroke-width="1.2"/>
      <rect x="170" y="17" width="42" height="24" rx="6" fill="#064e3b" fill-opacity="0.7" stroke="#34d399" stroke-width="1.2"/>
      <path class="thin amber dash" d="M61 -12 V70 M113 -12 V70 M165 -12 V70"/>
      <text x="61" y="-18" fill="#fbbf24" font-size="10" font-weight="800" text-anchor="middle">#</text>
      <text x="113" y="-18" fill="#fbbf24" font-size="10" font-weight="800" text-anchor="middle">#</text>
      <text x="165" y="-18" fill="#fbbf24" font-size="10" font-weight="800" text-anchor="middle">#</text>
      <path class="thin green" d="M36 78 H190" marker-end="url(#arrow-green)" opacity="0.75"/>
      <text x="113" y="104" class="tiny" text-anchor="middle">same data + config -> same boundaries</text>
    </g>
  </g>

  <g transform="translate(1184,134)">
    <rect class="mask" width="286" height="284" rx="16"/>
    <rect class="panel-green" width="286" height="284" rx="16"/>
    <text x="24" y="32" class="h3">Multi-version timeline</text>
    <text x="24" y="54" class="body">new roots reuse unchanged subtrees</text>

    <g transform="translate(34,100)">
      <path class="line green" d="M28 42 H196" marker-end="url(#arrow-green)" opacity="0.76"/>
      <circle cx="28" cy="42" r="10" fill="#082f49" stroke="#22d3ee" stroke-width="1.6"/>
      <circle cx="112" cy="42" r="10" fill="#064e3b" stroke="#34d399" stroke-width="1.6"/>
      <circle cx="196" cy="42" r="10" fill="#2e1065" stroke="#a78bfa" stroke-width="1.6"/>
      <text x="28" y="18" fill="#22d3ee" font-size="11" font-weight="800" text-anchor="middle">v1</text>
      <text x="112" y="18" fill="#34d399" font-size="11" font-weight="800" text-anchor="middle">v2</text>
      <text x="196" y="18" fill="#a78bfa" font-size="11" font-weight="800" text-anchor="middle">v3</text>

      <path d="M48 116 C84 98 140 98 176 116" fill="none" stroke="#34d399" stroke-width="12" stroke-opacity="0.18" stroke-linecap="round" filter="url(#greenGlow)"/>
      <path d="M48 116 C84 98 140 98 176 116" class="line green" filter="url(#greenGlow)"/>
      <rect class="mask" x="10" y="90" width="76" height="52" rx="9"/>
      <rect class="panel-green" x="10" y="90" width="76" height="52" rx="9"/>
      <text x="48" y="113" class="h3" text-anchor="middle">shared</text>
      <text x="48" y="130" class="micro" text-anchor="middle">same CID</text>
      <rect class="mask" x="138" y="90" width="76" height="52" rx="9"/>
      <rect class="panel-green" x="138" y="90" width="76" height="52" rx="9"/>
      <text x="176" y="113" class="h3" text-anchor="middle">shared</text>
      <text x="176" y="130" class="micro" text-anchor="middle">same CID</text>
      <rect class="mask" x="74" y="154" width="76" height="44" rx="9"/>
      <rect class="panel-violet" x="74" y="154" width="76" height="44" rx="9"/>
      <text x="112" y="174" class="h3" text-anchor="middle">delta</text>
      <text x="112" y="190" class="micro" text-anchor="middle">new CID</text>
    </g>
  </g>

  <!-- Convergence spine -->
  <g transform="translate(548,456)">
    <path class="thin violet" d="M143 -38 V0" marker-end="url(#arrow-violet)" opacity="0.65"/>
    <path class="thin amber" d="M461 -38 V0" marker-end="url(#arrow-amber)" opacity="0.65"/>
    <path class="thin green" d="M779 -38 V0" marker-end="url(#arrow-green)" opacity="0.65"/>
    <rect class="mask" width="922" height="82" rx="18"/>
    <rect class="panel-slate" width="922" height="82" rx="18"/>
    <text x="461" y="31" fill="#f8fafc" font-size="18" font-weight="800" text-anchor="middle">root CID = compact version handle</text>
    <text x="461" y="56" class="body" text-anchor="middle">unchanged serialized nodes keep identical CIDs, so versions share structure by content</text>
  </g>

  <g transform="translate(500,606)">
    <rect class="mask" width="1050" height="28" rx="10"/>
    <rect width="1050" height="28" rx="10" fill="#1e293b" fill-opacity="0.52" stroke="#64748b" stroke-width="1"/>
    <text x="525" y="19" fill="#cbd5e1" font-size="8.6" font-weight="600" text-anchor="middle">Core promise: stable content-defined structure makes ordered data cheap to version, compare, merge, and sync.</text>
  </g>
</svg>
