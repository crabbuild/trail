<svg viewBox="0 0 1040 720" xmlns="http://www.w3.org/2000/svg">
  <style>
    text { font-family: 'JetBrains Mono', 'SF Mono', 'Cascadia Code', monospace; }
    .title { fill: #f8fafc; font-size: 16px; font-weight: 700; }
    .subtitle { fill: #94a3b8; font-size: 9px; }
    .label { fill: #f8fafc; font-size: 11px; font-weight: 600; }
    .small { fill: #94a3b8; font-size: 8.5px; }
    .tiny { fill: #cbd5e1; font-size: 7.5px; }
    .yes { fill: #34d399; font-size: 8px; font-weight: 600; }
    .no { fill: #fb7185; font-size: 8px; font-weight: 600; }
    .arrow { fill: none; stroke: #64748b; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); }
    .arrow-blue { fill: none; stroke: #60a5fa; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow-blue); }
    .arrow-green { fill: none; stroke: #34d399; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow-green); }
    .arrow-rose { fill: none; stroke: #fb7185; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow-rose); }
  </style>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#60a5fa"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
    <marker id="arrow-rose" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fb7185"/>
    </marker>
  </defs>

  <rect width="1040" height="720" fill="#0f172a"/>
  <rect width="1040" height="720" fill="url(#grid)"/>

  <text x="30" y="34" class="title">Structural Diff and Subtree Pruning</text>
  <text x="30" y="52" class="subtitle">Equal CIDs skip whole subtrees; divergent local structure falls back to ordered comparison.</text>

  <rect x="60" y="90" width="245" height="80" rx="8" fill="#0f172a"/>
  <rect x="60" y="90" width="245" height="80" rx="8" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="182.5" y="116" class="label" text-anchor="middle">Base root</text>
  <text x="182.5" y="134" class="small" text-anchor="middle">root CID A</text>
  <text x="182.5" y="151" class="tiny" text-anchor="middle">older snapshot / common ancestor</text>

  <rect x="675" y="90" width="245" height="80" rx="8" fill="#0f172a"/>
  <rect x="675" y="90" width="245" height="80" rx="8" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="797.5" y="116" class="label" text-anchor="middle">Other root</text>
  <text x="797.5" y="134" class="small" text-anchor="middle">root CID B</text>
  <text x="797.5" y="151" class="tiny" text-anchor="middle">new snapshot / branch tip</text>

  <path class="arrow-blue" d="M 305 130 L 385 130"/>
  <path class="arrow-blue" d="M 675 130 L 595 130"/>

  <g transform="translate(490 130)">
    <polygon points="0,-48 78,0 0,48 -78,0" fill="#0f172a"/>
    <polygon points="0,-48 78,0 0,48 -78,0" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
    <text y="-5" class="label" text-anchor="middle">root CIDs</text>
    <text y="12" class="label" text-anchor="middle">equal?</text>
  </g>

  <path class="arrow-green" d="M 490 178 L 490 230"/>
  <text x="504" y="220" class="yes">No</text>

  <rect x="345" y="230" width="290" height="60" rx="6" fill="#0f172a"/>
  <rect x="345" y="230" width="290" height="60" rx="6" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="490" y="255" class="label" text-anchor="middle">Load paired nodes</text>
  <text x="490" y="271" class="small" text-anchor="middle">batch_get_ordered when available</text>

  <path class="arrow-green" d="M 490 202 L 660 202 L 660 262 L 735 262"/>
  <circle cx="490" cy="202" r="3.5" fill="#34d399"/>
  <text x="575" y="194" class="yes">Yes</text>
  <rect x="735" y="232" width="250" height="60" rx="6" fill="#0f172a"/>
  <rect x="735" y="232" width="250" height="60" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="860" y="257" class="label" text-anchor="middle">Return no changes</text>
  <text x="860" y="273" class="small" text-anchor="middle">O(1) same-root diff</text>

  <path class="arrow-blue" d="M 490 290 L 490 340"/>

  <g transform="translate(490 385)">
    <polygon points="0,-48 92,0 0,48 -92,0" fill="#0f172a"/>
    <polygon points="0,-48 92,0 0,48 -92,0" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
    <text y="-12" class="label" text-anchor="middle">same level +</text>
    <text y="4" class="label" text-anchor="middle">matching child</text>
    <text y="20" class="label" text-anchor="middle">spans?</text>
  </g>

  <path class="arrow-green" d="M 490 433 L 490 482"/>
  <text x="504" y="457" class="yes">Yes</text>

  <rect x="345" y="482" width="290" height="60" rx="6" fill="#0f172a"/>
  <rect x="345" y="482" width="290" height="60" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="490" y="507" class="label" text-anchor="middle">Compare child CIDs</text>
  <text x="490" y="523" class="small" text-anchor="middle">equal children are skipped</text>

  <path class="arrow-green" d="M 635 512 L 755 512"/>
  <rect x="755" y="482" width="180" height="60" rx="6" fill="#0f172a"/>
  <rect x="755" y="482" width="180" height="60" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="845" y="507" class="label" text-anchor="middle">Skip subtree</text>
  <text x="845" y="523" class="small" text-anchor="middle">identical CID</text>

  <path class="arrow-blue" d="M 490 542 L 490 590"/>
  <rect x="345" y="590" width="290" height="60" rx="6" fill="#0f172a"/>
  <rect x="345" y="590" width="290" height="60" rx="6" fill="rgba(59,130,246,0.3)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="490" y="615" class="label" text-anchor="middle">Recurse changed CIDs</text>
  <text x="490" y="631" class="small" text-anchor="middle">descend only into changed spans</text>

  <path class="arrow-rose" d="M 398 385 L 185 385 L 185 482"/>
  <text x="300" y="376" class="no">No</text>
  <rect x="60" y="482" width="250" height="60" rx="6" fill="#0f172a"/>
  <rect x="60" y="482" width="250" height="60" rx="6" fill="rgba(136,19,55,0.4)" stroke="#fb7185" stroke-width="1.5"/>
  <text x="185" y="507" class="label" text-anchor="middle">Ordered fallback</text>
  <text x="185" y="523" class="small" text-anchor="middle">collect affected entries locally</text>

  <path class="arrow" d="M 185 542 L 185 620 L 345 620"/>

  <rect x="182" y="666" width="616" height="34" rx="8" fill="#0f172a"/>
  <rect x="182" y="666" width="616" height="34" rx="8" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1"/>
  <text x="490" y="688" class="small" text-anchor="middle">Output remains key-level: Added, Removed, and Changed entries.</text>
</svg>
